<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: Verdana, sans-serif;
      }
      .mySlides {
        display: none;
      }
      img {
        vertical-align: middle;
      }

      /* Slideshow container */
      .slideshow-container {
        max-width: 1000px;
        position: relative;
        margin: auto;
      }

      /* Number text (1/3 etc) */
      .numbertext {
        color: #f2f2f2;
        font-size: 12px;
        padding: 8px 12px;
        position: absolute;
        top: 0;
      }

      /* On smaller screens, decrease text size */
      @media only screen and (max-width: 300px) {
        .text {
          font-size: 11px;
        }
      }
    </style>
  </head>
  <body>
    <div class="slideshow-container">
      <div class="mySlides">
        <div class="numbertext">0/10</div>
        <img src="image/Catizen_2k_0.jpg" style="width: 100%" />
      </div>
      <div class="mySlides">
        <div class="numbertext">1/10</div>
        <img src="image/Catizen_2k_1.jpg" style="width: 100%" />
      </div>
      <div class="mySlides">
        <div class="numbertext">2/10</div>
        <img src="image/Catizen_2k_2.jpg" style="width: 100%" />
      </div>
      <div class="mySlides">
        <div class="numbertext">3/10</div>
        <img src="image/Catizen_2k_3.jpg" style="width: 100%" />
      </div>
      <div class="mySlides">
        <div class="numbertext">4/10</div>
        <img src="image/Catizen_2k_4.jpg" style="width: 100%" />
      </div>
      <div class="mySlides">
        <div class="numbertext">5/10</div>
        <img src="image/Catizen_2k_5.jpg" style="width: 100%" />
      </div>
      <div class="mySlides">
        <div class="numbertext">6/10</div>
        <img src="image/Catizen_2k_6.jpg" style="width: 100%" />
      </div>
      <div class="mySlides">
        <div class="numbertext">7/10</div>
        <img src="image/Catizen_2k_7.jpg" style="width: 100%" />
      </div>
      <div class="mySlides">
        <div class="numbertext">8/10</div>
        <img src="image/Catizen_2k_8.jpg" style="width: 100%" />
      </div>
      <div class="mySlides">
        <div class="numbertext">9/10</div>
        <img src="image/Catizen_2k_9.jpg" style="width: 100%" />
      </div>
      <div class="mySlides"></div>
        <div class="numbertext">10/10</div>
        <img src="image/Catizen_2k_400.jpg" style="width: 100%" />
      </div>
    </div>
    <br />

    <script>
      let slideIndex = 0;
      showSlides();

      function showSlides() {
        let i;
        let slides = document.getElementsByClassName("mySlides");
        for (i = 0; i < slides.length; i++) {
          slides[i].style.display = "none";
        }
        slideIndex++;
        if (slideIndex > slides.length) {
          slideIndex = 1;
        }
        slides[slideIndex - 1].style.display = "block";
        setTimeout(showSlides, 500);
      }
    </script>
  </body>
</html>
