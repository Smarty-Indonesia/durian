<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: Verdana, sans-serif;
      }
      .mySlides {
        display: none;
      }
      img {
        vertical-align: middle;
      }

      /* Slideshow container */
      .slideshow-container {
        max-width: 1000px;
        position: relative;
        margin: auto;
      }

      /* Number text (1/3 etc) */
      .numbertext {
        color: #f2f2f2;
        font-size: 12px;
        padding: 8px 12px;
        position: absolute;
        top: 0;
      }

      /* On smaller screens, decrease text size */
      @media only screen and (max-width: 300px) {
        .text {
          font-size: 11px;
        }
      }
    </style>
  </head>
  <body>
    <div class="slideshow-container">
      <script>
        for (var i = 0; i < 570; i++) {
          document.body.innerHTML +=
            '<div class="mySlides"><div class="numbertext">' +
            i +
            '</div><img src="image/Catizen_2k_ (' +
            i +
            ').jpg" style="width: 50%" /></div>';
        }
      </script>
    </div>
    <br />

    <script>
      let slideIndex = 0;
      showSlides();

      function showSlides() {
        let i;
        let slides = document.getElementsByClassName("mySlides");
        let numbertext = document.getElementsByClassName("numbertext");
        for (i = 0; i < slides.length; i++) {
          slides[i].style.display = "none";
          numbertext[i].style.display = "none";
        }
        slideIndex++;
        if (slideIndex > slides.length) {
          slideIndex = 1;
        }
        numbertext[slideIndex - 1].style.display = i;
        slides[slideIndex - 1].style.display = "block";
        setTimeout(showSlides, 50);
      }
    </script>
  </body>
</html>
